# Builds the self-contained ATLAS runtime bundle for every supported
# platform and produces a merged release index + per-platform tarballs
# (docs/runbooks/clean-machine-install.md's "Release Index Shape").
#
# This is Phase 2 Track B1: the existing pipeline (scripts/ci/
# build-windows-runtime.ps1, published today only by publish-npm.yml) gets
# Linux and macOS siblings (scripts/ci/build-{linux,darwin}-runtime.sh).
# publish-npm.yml is left untouched — it publishes the two npm packages
# (@systemsl2/atlas + @systemsl2/atlas-win32-x64) and is Windows-only by
# design today. This workflow is a separate, additive concern: building
# GitHub Release-style tarballs + a combined index.json across all four
# platforms, published as a GitHub Release under the *same* `v*` tag that
# triggers publish-npm.yml (decision + rationale in the `merge-index` job
# below and HANDOFF.md Part 0.6 Track C — matches how Bun/Deno/esbuild cut
# one tag for both npm and binary artifacts, rather than requiring the
# maintainer to remember two separate tags for one release). `atlas
# install`/`atlas update` fall back to this release index
# (packages/atlas-cli/package.json's `atlas.releaseManifest`) whenever no
# npm platform package exists for the host OS/arch — i.e. today, for every
# non-Windows install.
#
# Matrix rationale:
#   win32-x64    windows-latest  — existing, unmodified build-windows-runtime.ps1
#   linux-x64    ubuntu-latest   — new build-linux-runtime.sh (x64 only; linux
#                                  aarch64 is a v2 TODO, see that script)
#   darwin-x64   macos-13        — new build-darwin-runtime.sh (Intel runner)
#   darwin-arm64 macos-14        — new build-darwin-runtime.sh (Apple Silicon
#                                  runner; GitHub-hosted macos-14 is arm64)
#
# macos-13/macos-14 runner labels reflect GitHub's hosted-runner catalog at
# the time this workflow was written (macos-13 = Intel, macos-14+ = Apple
# Silicon). Confirm these labels are still valid for this account's GitHub
# plan before relying on this workflow — hosted runner images/labels do get
# retired over time.
#
# No code-signing/notarization: unsigned binaries only, per the Track B1
# brief (deferred).
name: Release Runtime Matrix

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.2.0); defaults to packages/atlas-cli/package.json"
        required: false
  push:
    # Same tag family as publish-npm.yml's `v*` trigger — one tag push cuts
    # both the npm release and the GitHub Release runtime bundles (see
    # header comment). The two workflows run as independent jobs on the
    # same event; neither blocks the other, and each keeps its own
    # concurrency group and permission scope.
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-runtime-matrix-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: win32-x64
            os: windows-latest
            entrypoint: bin/atlas.js
          - platform: linux-x64
            os: ubuntu-latest
            entrypoint: bin/atlas
          - platform: darwin-x64
            os: macos-13
            entrypoint: bin/atlas
          - platform: darwin-arm64
            os: macos-14
            entrypoint: bin/atlas
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/atlas-core-rs

      - uses: actions/setup-go@v5
        with:
          go-version-file: services/atlas-tui/go.mod
          cache-dependency-path: services/atlas-tui/go.sum

      - name: Resolve build version
        id: version
        shell: bash
        run: |
          version="${{ inputs.version }}"
          if [ -z "$version" ]; then
            if [ "${{ github.ref_type }}" = "tag" ]; then
              version="${GITHUB_REF_NAME#v}"
            else
              version="$(node -p "require('./packages/atlas-cli/package.json').version")"
            fi
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building version $version"

      - name: Guard tag/source version agreement
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          source_version="$(node -p "require('./packages/atlas-cli/package.json').version")"
          target_version="${{ steps.version.outputs.version }}"
          if [ "$source_version" != "$target_version" ]; then
            echo "source is versioned $source_version but the release asks for $target_version; commit the version bump first" >&2
            exit 1
          fi

      - name: Install cockpit dependencies
        working-directory: services/web-ui-react
        run: npm ci

      - name: Build Windows runtime bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./scripts/ci/build-windows-runtime.ps1 -Version "${{ steps.version.outputs.version }}" -OutputDir artifacts/bundle

      - name: Build Linux runtime bundle
        if: runner.os == 'Linux'
        shell: bash
        run: |
          bash scripts/ci/build-linux-runtime.sh --version "${{ steps.version.outputs.version }}" --output-dir artifacts/bundle

      - name: Build macOS runtime bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          bash scripts/ci/build-darwin-runtime.sh --version "${{ steps.version.outputs.version }}" --output-dir artifacts/bundle

      - name: Build release archive + index fragment
        shell: bash
        run: |
          node scripts/ci/build-release-index.js \
            --bundle artifacts/bundle \
            --out-dir artifacts/release \
            --version "${{ steps.version.outputs.version }}" \
            --platform "${{ matrix.platform }}" \
            --entrypoint "${{ matrix.entrypoint }}" \
            --channel stable \
            --index-name "release-index.${{ matrix.platform }}.json"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: artifacts/release/*
          if-no-files-found: error

  merge-index:
    name: merge release indexes
    needs: build
    runs-on: ubuntu-latest
    # Decision (2026-07-19, see docs/operations/INSTALL.md and HANDOFF.md Part
    # 0.6 Track C for the full rationale): this job publishes a real GitHub
    # Release using the repo-default GITHUB_TOKEN. contents: write is the only
    # elevated permission needed — this is a same-repo release (not a
    # cross-repo or third-party-registry publish), which is exactly the case
    # GITHUB_TOKEN covers; no PAT or OIDC trusted-publishing is required. Per
    # GitHub's limits, individual release assets may be up to 2 GiB, well
    # above these bundles' ~50-150 MB size.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          version="${{ inputs.version }}"
          if [ -z "$version" ]; then
            if [ "${{ github.ref_type }}" = "tag" ]; then
              version="${GITHUB_REF_NAME#v}"
            else
              version="$(node -p "require('./packages/atlas-cli/package.json').version")"
            fi
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: artifacts/all-releases
          merge-multiple: true

      - name: Merge per-platform index fragments
        run: |
          # Each platform wrote its own uniquely-named `release-index.<platform>.json`
          # fragment (see the build job's --index-name) precisely so that
          # merge-multiple downloading all 4 platform artifacts into one flat
          # directory can't collide same-named files. The merged output is
          # named `atlas-release-index.json` to match the filename baked into
          # packages/atlas-cli/package.json's `atlas.releaseManifest` default
          # (consumed by `atlas install`/`atlas update` as the release-index
          # fallback when no npm platform package is available for the host
          # OS/arch — see bin/atlas.js).
          node scripts/ci/merge-release-indexes.js \
            --dir artifacts/all-releases \
            --pattern '*.json' \
            --out artifacts/all-releases/atlas-release-index.json

      - uses: actions/upload-artifact@v4
        with:
          name: release-index-merged
          path: artifacts/all-releases/*

      # Decision (2026-07-19, revised from an earlier `runtime-v*`-only draft
      # after review): converges on publish-npm.yml's `v*` tag rather than a
      # separate `runtime-v*` trigger. Bun/Deno/esbuild all cut one tag for
      # both npm and binary artifacts — a second tag is an extra step a
      # single-maintainer release process will eventually forget to push,
      # silently leaving the release index stale relative to npm. This
      # workflow's `push.tags` and publish-npm.yml's `push.tags` glob against
      # the ref name independently — `v*` does not also match a distinct
      # `runtime-v*` pattern (it would need to, and no longer does), so
      # there's no double-fire/glob-collision risk to guard against. The two
      # workflows remain separate *files* (not merged into one): they need
      # different permission profiles (NPM_TOKEN + contents:read vs.
      # GITHUB_TOKEN + contents:write) and different concurrency scopes
      # (single global npm-publish slot vs. per-ref matrix), and merging them
      # would put a 4-platform matrix's failure surface into the one pipeline
      # that has actually passed clean-machine UAT (docs/operations/
      # INSTALL.md). `contents: write` is scoped to this job only
      # (workflow-level permission stays `contents: read`). `tag_name` is set
      # to the real triggering tag (not a synthesized one) so
      # `softprops/action-gh-release` attaches to the tag that already
      # exists rather than creating a divergent one. `prerelease: false` (the
      # default) is required for `/releases/latest` resolution to pick this
      # release up. Pinned to @v3 (Node 24 runtime; v2's last release,
      # 2.6.2, is EOL on the deprecated Node 20 runtime — v3 is a pure
      # runtime bump with no functional changes per the action's release
      # notes).
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ATLAS v${{ steps.version.outputs.version }}
          prerelease: false
          files: |
            artifacts/all-releases/*.tar.gz
            artifacts/all-releases/atlas-release-index.json
